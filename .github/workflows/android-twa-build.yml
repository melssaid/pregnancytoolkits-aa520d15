name: Android TWA Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android version code (integer, e.g. 2)"
        required: false
        default: "1"
      version_name:
        description: "Android version name (e.g. 1.0.1)"
        required: false
        default: "1.0.0"

jobs:
  web-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  android-twa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [web-build]
    defaults:
      run:
        shell: bash
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Resolve sdkmanager binary
        run: |
          if [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" >> "$GITHUB_ENV"
          elif [ -x "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" ]; then
            echo "SDKMANAGER=$ANDROID_HOME/cmdline-tools/bin/sdkmanager" >> "$GITHUB_ENV"
          elif command -v sdkmanager >/dev/null 2>&1; then
            echo "SDKMANAGER=$(command -v sdkmanager)" >> "$GITHUB_ENV"
          else
            echo "sdkmanager not found"
            exit 1
          fi

      - name: Install Android SDK packages
        run: |
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --install "platform-tools" "platforms;android-36" "platforms;android-35" "build-tools;35.0.0"

      - name: Normalize Android SDK layout for Bubblewrap
        run: |
          mkdir -p "$ANDROID_HOME/tools"
          if [ ! -e "$ANDROID_HOME/tools/bin" ] && [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest/bin" "$ANDROID_HOME/tools/bin"
          fi

      - name: Verify environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          test -d "$ANDROID_HOME/build-tools" || { echo "build-tools missing"; exit 1; }
          test -d "$ANDROID_HOME/platform-tools" || { echo "platform-tools missing"; exit 1; }
          test -d "$ANDROID_HOME/platforms" || { echo "platforms missing"; exit 1; }
          test -d "$ANDROID_HOME/platforms/android-36" || { echo "platform android-36 missing"; exit 1; }
          test -d "$ANDROID_HOME/build-tools/35.0.0" || { echo "build-tools 35.0.0 missing"; exit 1; }
          echo "Installed Android platforms:"
          ls -1 "$ANDROID_HOME/platforms"
          echo "Installed build-tools:"
          ls -1 "$ANDROID_HOME/build-tools"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Configure Bubblewrap paths
        run: |
          mkdir -p "$HOME/.bubblewrap"
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"
          printf 'n\n' | bubblewrap doctor

      - name: Setup keystore (auto-generate if no KEYSTORE_BASE64)
        run: |
          STORE_PASS="${{ secrets.STORE_PASSWORD }}"
          KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          ALIAS="${{ secrets.KEY_ALIAS }}"
          test -n "$STORE_PASS" || { echo "Missing STORE_PASSWORD secret"; exit 1; }
          test -n "$KEY_PASS" || { echo "Missing KEY_PASSWORD secret"; exit 1; }
          test -n "$ALIAS" || ALIAS="upload"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using existing KEYSTORE_BASE64 secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/android.keystore"
          else
            echo "No KEYSTORE_BASE64 found — generating new upload keystore"
            keytool -genkeypair -v \
              -keystore "${{ github.workspace }}/android.keystore" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias "$ALIAS" \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=Pregnancy Toolkits, OU=Mobile, O=PregnancyToolkits, L=Unknown, ST=Unknown, C=US"
            echo ""
            echo "=========================================="
            echo "IMPORTANT: Save this KEYSTORE_BASE64 as a GitHub secret"
            echo "so future builds use the same key:"
            echo "=========================================="
            base64 -w 0 "${{ github.workspace }}/android.keystore"
            echo ""
            echo "=========================================="
            echo ""
            echo "Upload certificate (.pem) to Google Play Console → App Signing → Reset upload key:"
            keytool -exportcert -alias "$ALIAS" \
              -keystore "${{ github.workspace }}/android.keystore" \
              -storepass "$STORE_PASS" \
              -rfc
          fi
          chmod 600 "${{ github.workspace }}/android.keystore"

      - name: Patch TWA manifest
        run: |
          VERSION_CODE="${{ github.event.inputs.version_code || '1' }}"
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.0' }}"
          ALIAS="${{ secrets.KEY_ALIAS }}"
          test -n "$ALIAS" || ALIAS="upload"
          jq \
            --arg alias "$ALIAS" \
            --arg keyPath "${{ github.workspace }}/android.keystore" \
            --argjson vcode "$VERSION_CODE" \
            --arg vname "$VERSION_NAME" \
            '.signingKey.alias = $alias | .signingKey.path = $keyPath | .appVersionCode = $vcode | .appVersionName = $vname' \
            twa-manifest.json > twa-manifest.patched.json
          mv twa-manifest.patched.json twa-manifest.json
          echo "Patched twa-manifest.json:"
          cat twa-manifest.json

      - name: Generate TWA project
        run: |
          bubblewrap update --skipVersionUpgrade
          test -f gradlew || { echo "ERROR: gradlew not generated"; exit 1; }
          echo "TWA project generated successfully"

      - name: Harden generated TWA project for Play Billing
        run: |
          node scripts/patch-twa-project.mjs "${{ github.workspace }}"

      - name: Verify versionName is not null
        run: |
          if grep -qE 'versionName\s*=?\s*null' app/build.gradle; then
            echo "❌ FAIL: versionName is still null after patching!"
            grep -n "versionName" app/build.gradle
            exit 1
          fi
          echo "✅ versionName verified:"
          grep -n "versionName" app/build.gradle

      - name: Deep verification of TWA native binding
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║     TWA NATIVE BINDING — DEEP VERIFICATION      ║"
          echo "╚══════════════════════════════════════════════════╝"
          FAIL=0

          echo ""
          echo "━━━ 1. Full AndroidManifest.xml ━━━"
          cat app/src/main/AndroidManifest.xml
          echo ""

          echo "━━━ 2. DelegationService in manifest ━━━"
          if grep -q "DelegationService" app/src/main/AndroidManifest.xml; then
            echo "✅ DelegationService declared"
            grep "DelegationService" app/src/main/AndroidManifest.xml
          else
            echo "❌ FAIL: DelegationService NOT in manifest"
            FAIL=1
          fi
          echo ""

          echo "━━━ 3. TRUSTED_WEB_ACTIVITY_SERVICE intent ━━━"
          if grep -q "TRUSTED_WEB_ACTIVITY_SERVICE" app/src/main/AndroidManifest.xml; then
            echo "✅ TWA service intent-filter present"
          else
            echo "❌ FAIL: TRUSTED_WEB_ACTIVITY_SERVICE intent missing"
            FAIL=1
          fi
          echo ""

          echo "━━━ 4. Host & applicationId from resources ━━━"
          echo "-- strings.xml --"
          cat app/src/main/res/values/strings.xml 2>/dev/null || echo "(no strings.xml)"
          echo ""
          echo "-- hostName from resources --"
          grep -r "hostName\|host_name\|pregnancytoolkits" app/src/main/res/ 2>/dev/null || echo "(no hostName found in resources)"
          echo ""
          echo "-- applicationId from build.gradle --"
          grep -i "applicationId\|namespace" app/build.gradle || echo "(not found)"
          echo ""

          echo "━━━ 5. SDK versions ━━━"
          grep -E "compileSdk|minSdk|targetSdk" app/build.gradle
          echo ""

          echo "━━━ 6. Billing dependencies ━━━"
          grep -i "androidbrowserhelper\|billing" app/build.gradle || echo "❌ No billing deps"
          echo ""

          echo "━━━ 7. DelegationService source file ━━━"
          DS_FILES=$(find app/src -name "DelegationService.*" 2>/dev/null)
          if [ -n "$DS_FILES" ]; then
            echo "✅ Found: $DS_FILES"
            for f in $DS_FILES; do echo "-- $f --"; cat "$f"; echo ""; done
          else
            echo "❌ FAIL: No DelegationService source file generated"
            FAIL=1
          fi
          echo ""

          echo "━━━ 8. All Java/Kotlin source files ━━━"
          find app/src -name "*.java" -o -name "*.kt" | sort
          echo ""

          echo "━━━ 9. DigitalGoods references across project ━━━"
          grep -rl "DigitalGoods\|playbilling\|digital_goods" app/src/ 2>/dev/null || echo "(none)"
          echo ""

          echo "━━━ 10. Asset links verification ━━━"
          if [ -f "app/src/main/res/values/strings.xml" ]; then
            HOST=$(grep -oP '(?<=<string name="hostName">)[^<]+' app/src/main/res/values/strings.xml 2>/dev/null || true)
            echo "Host from strings.xml: ${HOST:-(not found as separate string)}"
            echo "-- site URL from assetStatements --"
            grep -oP '(?<="site": ")[^"]+' app/src/main/res/values/strings.xml 2>/dev/null || echo "(not found)"
          fi
          echo "-- PaymentActivity in manifest --"
          grep -A5 "PaymentActivity" app/src/main/AndroidManifest.xml 2>/dev/null || echo "(not found)"
          echo "-- PaymentService in manifest --"
          grep -A5 "PaymentService" app/src/main/AndroidManifest.xml 2>/dev/null || echo "(not found)"
          echo ""

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ $FAIL -eq 0 ]; then
            echo "✅ ALL CHECKS PASSED — native binding looks correct"
          else
            echo "❌ SOME CHECKS FAILED — review output above"
            exit 1
          fi

      - name: Build Android TWA (AAB + APK)
        run: |
          printf 'n\n' | bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: List output files
        run: |
          ls -la .
          ls -la app-release-bundle || true

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-release.aab
          path: |
            app-release-bundle/app-release.aab
            *.aab
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-release.apk
          path: |
            app-release.apk
            *.apk
          if-no-files-found: warn
