name: Cleanup Artifacts

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts (keep latest 5)
        run: |
          artifacts=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate -q '.artifacts | sort_by(.created_at) | reverse | .[5:] | .[].id')
          for id in $artifacts; do
            echo "Deleting artifact $id"
            gh api -X DELETE /repos/${{ github.repository }}/actions/artifacts/$id || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
