      ></video>
      <style>
        #splash-video::-webkit-media-controls,
        #splash-video::-webkit-media-controls-enclosure,

      </style>
    </div>
    <script>
      (function(){
        var SPLASH_KEY='pt_video_splash_seen';
        var SPLASH_SESSION_KEY='pt_video_splash_seen_session';
        var overlay=document.getElementById('splash-overlay');
        var vid=document.getElementById('splash-video');
        if(!overlay||!vid){return;}

        var hasSeenSessionSplash=false;
        try {
          hasSeenSessionSplash = sessionStorage.getItem(SPLASH_SESSION_KEY)==='true';
        } catch(e) {}

        if(hasSeenSessionSplash){
          try { vid.pause(); vid.removeAttribute('src'); vid.load(); } catch(e){}
          if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
          window.__htmlSplashVideoActive=false;
          window.__htmlSplashVideoEnded=true;
          window.dispatchEvent(new CustomEvent('html-splash-ended'));
          return;
        }

        // Keep the page background black so nothing light flashes before the
        // splash video paints.
        var APP_BG='#000';
        document.body.style.background=APP_BG;
        document.documentElement.style.background=APP_BG;

        window.__htmlSplashVideoActive=true;
        window.__htmlSplashVideoEnded=false;

        var done=false;
        var appReady=false;
        var minShownAt=Date.now();
        var MIN_DURATION=800; // shorter — only enforce brand moment, not extra wait

        window.addEventListener('app:first-render', function(){
          appReady=true;
          maybeFinish();
        }, {once:true});

        function fadeOverlay(){
          try { vid.pause(); } catch(e){}
          overlay.style.opacity='0';
          setTimeout(function(){
            if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
          }, 500);
        }

        function maybeFinish(){
          if(done) return;
          if(!appReady) return;
          var elapsed=Date.now()-minShownAt;
          var wait=Math.max(0, MIN_DURATION-elapsed);
          done=true;
          localStorage.setItem(SPLASH_KEY,'true');
          try { sessionStorage.setItem(SPLASH_SESSION_KEY,'true'); } catch(e) {}
          window.__htmlSplashVideoActive=false;
          window.__htmlSplashVideoEnded=true;
          window.dispatchEvent(new CustomEvent('html-splash-ended'));
          setTimeout(function(){
            requestAnimationFrame(function(){
              requestAnimationFrame(fadeOverlay);
            });
          }, wait);
        }

        vid.addEventListener('error', function(){ appReady=true; maybeFinish(); }, {once:true});
        vid.addEventListener('stalled', function(){
          setTimeout(function(){ appReady=true; maybeFinish(); }, 1500);
        }, {once:true});

        function tryPlay(){
          try{
            var p=vid.play();
            if(p && p.then){ p.catch(function(){}); }
          }catch(e){}
        }
        vid.addEventListener('loadedmetadata', tryPlay, {once:true});
        tryPlay();

        // If video can't autoplay, don't block
        setTimeout(function(){
          if(vid.paused && vid.currentTime===0){ appReady=true; maybeFinish(); }
        }, 1200);

        // Hard safety cap — never block user behind splash for more than 4s
        setTimeout(function(){ appReady=true; maybeFinish(); }, 4000);
      })();
    </script>
